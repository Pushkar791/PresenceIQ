services:
  mongo:
    image: mongo:7
    container_name: smartattend-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - smartattend_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  smartattend_mongo_data:
